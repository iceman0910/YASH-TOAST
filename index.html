<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="雅式吐司計算">
<title>雅式吐司計算</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #666660;
    --text3: #999994;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --success: #2d7a3a;
    --danger-bg: #fdecea;
    --danger: #b93030;
    --danger-border: rgba(185,48,48,0.3);
    --radius: 10px;
    --radius-lg: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #272724;
      --bg3: #303030;
      --text: #f0efe8;
      --text2: #9a9990;
      --text3: #666660;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --success: #5cbf6e;
      --danger-bg: #3a1a1a;
      --danger: #e07070;
      --danger-border: rgba(224,112,112,0.3);
    }
  }

  html, body { height: 100%; background: var(--bg2); font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; color: var(--text); }

  .app { max-width: 500px; margin: 0 auto; padding: 0 0 40px; min-height: 100%; background: var(--bg2); }

  /* Header */
  .header { padding: 20px 16px 12px; background: var(--bg); border-bottom: 0.5px solid var(--border); }
  .header h1 { font-size: 28px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
  .header .date { font-size: 15px; color: var(--text2); margin-top: 2px; }

  /* Tabs */
  .tabs { display: flex; background: var(--bg); border-bottom: 0.5px solid var(--border); }
  .tab { flex: 1; padding: 14px 6px; font-size: 16px; font-weight: 500; color: var(--text2); text-align: center; cursor: pointer; border-bottom: 2.5px solid transparent; transition: color 0.15s, border-color 0.15s; user-select: none; -webkit-tap-highlight-color: transparent; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }

  /* Content */
  .tab-content { display: none; padding: 14px 12px; }
  .tab-content.active { display: block; }

  /* Cards */
  .card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 16px; margin-bottom: 12px; }
  .card-yellow { background: #fff8c5; border-radius: var(--radius-lg); border: 0.5px solid #e6c800; padding: 16px; margin-bottom: 12px; }
  .card-yellow .card-title { font-size: 19px; font-weight: 600; color: #7a6000; margin-bottom: 14px; }
  .card-yellow .field-label { font-size: 19px; color: #5a4500; flex: 1; }
  @media (prefers-color-scheme: dark) {
    .card-yellow { background: #3a3000; border-color: #a08800; }
    .card-yellow .card-title { color: #ffd84d; }
    .card-yellow .field-label { color: #f0c830; }
  }
  .card-title { font-size: 19px; font-weight: 600; color: var(--text); margin-bottom: 14px; }

  /* Field rows */
  .field-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .field-row:last-child { margin-bottom: 0; }
  .field-label { font-size: 19px; color: var(--text); flex: 1; }

  /* Quantity control */
  .qty-ctrl { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 46px; height: 46px; font-size: 26px; line-height: 1;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-weight: 400; -webkit-tap-highlight-color: transparent;
    user-select: none; transition: background 0.1s;
  }
  .qty-btn:active { background: var(--bg3); }
  .qty-input {
    width: 72px; height: 46px; font-size: 22px; font-weight: 600;
    text-align: center; border: 0.5px solid var(--border2);
    border-radius: var(--radius); background: var(--bg); color: var(--text);
    /* Key: numeric keyboard on mobile */
    inputmode: numeric;
    -webkit-appearance: none; appearance: none;
  }
  .qty-input:focus { outline: none; border-color: var(--text); }
  /* Hide number spinners */
  .qty-input::-webkit-outer-spin-button,
  .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .qty-input[type=number] { -moz-appearance: textfield; }

  /* Summary */
  .summary-card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 16px; margin-bottom: 12px; }
  .summary-label-row { font-size: 14px; color: var(--text2); margin-bottom: 10px; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; }
  .summary-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
  .summary-row:last-child { border-bottom: none; padding-bottom: 0; }
  .summary-row-label { font-size: 18px; color: var(--text); }
  .summary-row-value { font-size: 24px; font-weight: 600; color: var(--text); }
  .result-value { font-size: 30px; font-weight: 700; color: var(--success); }

  /* Admin */
  .admin-input-row { display: flex; gap: 8px; }
  .admin-input {
    flex: 1; height: 50px; font-size: 18px; padding: 0 14px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg); color: var(--text);
  }
  .admin-input:focus { outline: none; border-color: var(--text); }
  .btn-add {
    height: 50px; padding: 0 18px; font-size: 17px; font-weight: 500;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text); cursor: pointer;
    -webkit-tap-highlight-color: transparent; white-space: nowrap;
  }
  .btn-add:active { background: var(--bg3); }
  .vendor-list-item { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 0.5px solid var(--border); }
  .vendor-list-item:last-child { border-bottom: none; }
  .vendor-list-name { font-size: 20px; color: var(--text); }
  .btn-del {
    height: 38px; padding: 0 14px; font-size: 15px; font-weight: 500;
    border: 0.5px solid var(--danger-border); border-radius: var(--radius);
    background: var(--danger-bg); color: var(--danger); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-del:active { opacity: 0.7; }
  .btn-edit {
    height: 38px; padding: 0 14px; font-size: 15px; font-weight: 500;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-edit:active { background: var(--bg3); }
  .btn-save {
    height: 38px; padding: 0 14px; font-size: 15px; font-weight: 500;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--success); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-save:active { background: var(--bg3); }

  /* Misc */
  .no-vendor { font-size: 17px; color: var(--text2); text-align: center; padding: 24px 0; }
  .reset-note { font-size: 14px; color: var(--text3); text-align: center; margin-top: 6px; padding: 0 8px; }
  .vendor-name-label { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 14px; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 10px 0; }
  .error-msg { font-size: 14px; color: var(--danger); margin-top: 6px; display: none; }
  .error-msg.show { display: block; }
  .history-item { padding: 14px 0; border-bottom: 0.5px solid var(--border); }
  .history-item:last-child { border-bottom: none; }
  .history-date { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .history-guan { font-size: 20px; font-weight: 600; color: var(--success); }
  .history-detail { font-size: 14px; color: var(--text2); margin-top: 4px; }
  .history-vendor { font-size: 14px; color: var(--text3); padding-left: 8px; }
  .schedule-vendor { border-bottom: 0.5px solid var(--border); padding-bottom: 14px; margin-bottom: 14px; }
  .schedule-vendor:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .schedule-vendor-name { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .schedule-body { display: none; }
  .schedule-body.open { display: block; }
  .schedule-day-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .schedule-day-label { font-size: 16px; color: var(--text2); width: 32px; flex-shrink: 0; }
  .schedule-type-label { font-size: 14px; color: var(--text3); width: 36px; flex-shrink: 0; }
  .schedule-input { width: 60px; height: 38px; font-size: 17px; font-weight: 600; text-align: center; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); -webkit-appearance: none; appearance: none; }
  .schedule-input::-webkit-outer-spin-button, .schedule-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .schedule-input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div class="app">
  <div class="header" style="position:relative">
    <h1>🍞 雅式吐司計算</h1>
    <div class="date" id="date-display"></div>
    <div id="secret-zone" onclick="secretTap()" style="
      position:absolute; top:0; right:0;
      width:64px; height:64px;
      cursor:default; -webkit-tap-highlight-color:transparent;
    "></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('main')">輸入訂單</div>
  </div>

  <!-- 輸入訂單 -->
  <div id="tab-main" class="tab-content active">
    <div id="vendor-inputs"></div>

    <div class="card" style="border: 1.5px dashed var(--border2); background: var(--bg2);">
      <div class="card-title">臨時加單</div>
      <div class="field-row">
        <div class="field-label">白吐司</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="adj('extra_white',-1)">－</button>
          <input class="qty-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" id="extra_white" value="0" oninput="saveData()">
          <button class="qty-btn" onclick="adj('extra_white',1)">＋</button>
        </div>
      </div>
      <div class="field-row">
        <div class="field-label">全麥吐司</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="adj('extra_whole',-1)">－</button>
          <input class="qty-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" id="extra_whole" value="0" oninput="saveData()">
          <button class="qty-btn" onclick="adj('extra_whole',1)">＋</button>
        </div>
      </div>
    </div>

    <div class="card-yellow">
      <div class="card-title">當天剩餘庫存</div>
      <div class="field-row">
        <div class="field-label">白吐司剩餘</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="adj('remain_white',-1)">－</button>
          <input class="qty-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" id="remain_white" value="0" oninput="saveData()">
          <button class="qty-btn" onclick="adj('remain_white',1)">＋</button>
        </div>
      </div>
      <div class="field-row">
        <div class="field-label">全麥吐司剩餘</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="adj('remain_whole',-1)">－</button>
          <input class="qty-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" id="remain_whole" value="0" oninput="saveData()">
          <button class="qty-btn" onclick="adj('remain_whole',1)">＋</button>
        </div>
      </div>
    </div>

    <div class="summary-card">
      <div class="summary-label-row" style="font-size:17px">隔天需製作數量</div>
      <div class="summary-row">
        <div style="flex:1">
          <div style="font-size:30px;font-weight:600;color:var(--text);margin-bottom:6px">白吐司</div>
          <div style="font-size:30px;color:var(--text2)" id="white-breakdown">廠商 0 條 ＋ 店面 15 條 － 剩餘 0 條</div>
        </div>
        <div style="text-align:right;padding-left:12px">
          <div class="result-value" style="font-size:38px" id="need-white-guan">0 貫</div>
          <div style="font-size:22px;color:var(--text2)" id="need-white-tiao">（0 條）</div>
        </div>
      </div>
      <div class="summary-row">
        <div style="flex:1">
          <div style="font-size:30px;font-weight:600;color:var(--text);margin-bottom:6px">全麥吐司</div>
          <div style="font-size:30px;color:var(--text2)" id="whole-breakdown">廠商 0 條 ＋ 店面 0 條 － 剩餘 0 條</div>
        </div>
        <div style="text-align:right;padding-left:12px">
          <div class="result-value" style="font-size:38px" id="need-whole-guan">0 貫</div>
          <div style="font-size:22px;color:var(--text2)" id="need-whole-tiao">（0 條）</div>
        </div>
      </div>
    </div>

    <div class="reset-note" id="reset-note"></div>

    <div style="padding: 8px 0 4px">
      <button id="confirm-btn" onclick="toggleConfirm()" style="
        width:100%; padding: 18px 0; font-size: 22px; font-weight: 600;
        border-radius: var(--radius-lg); border: none; cursor: pointer;
        background: #2d7a3a; color: #fff;
        -webkit-tap-highlight-color: transparent; transition: background 0.15s;
      ">當日數量已確認</button>
      <div id="confirm-note" style="font-size:14px;color:var(--text3);text-align:center;margin-top:8px;display:none">
        數量已鎖定，再按一次可重新修改
      </div>
      <div id="confirm-time" style="font-size:14px;color:var(--text3);text-align:center;margin-top:4px;display:none"></div>
    </div>

    <div style="padding: 4px 0 16px">
      <button onclick="location.reload()" style="
        width:100%; padding: 14px 0; font-size: 18px; font-weight: 500;
        border-radius: var(--radius-lg); border: 0.5px solid var(--border2);
        background: var(--bg2); color: var(--text2);
        cursor:pointer; -webkit-tap-highlight-color:transparent;
      ">↺ 重新整理</button>
    </div>
  </div>

  <!-- 管理模式（隱藏，右上角連點3下開啟） -->
  <div id="admin-tab" style="display:none">
  <div id="tab-admin" class="tab-content">
    <div class="card">
      <div class="card-title">預設數量設定</div>
      <div class="field-row">
        <div class="field-label">白吐司店面預設</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="adjSetting('store_white',-1)">－</button>
          <input class="qty-input" type="number" inputmode="numeric" pattern="[0-9]*" min="1" id="setting_store_white" value="15" oninput="saveSetting('store_white',this.value)">
          <button class="qty-btn" onclick="adjSetting('store_white',1)">＋</button>
        </div>
      </div>
      <div style="font-size:14px;color:var(--text3);margin-bottom:14px;padding-left:2px">條（每天固定加入白吐司計算）</div>
      <div class="field-row">
        <div class="field-label">全麥無訂購預設</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="adjSetting('default_whole_tiao',-1)">－</button>
          <input class="qty-input" type="number" inputmode="numeric" pattern="[0-9]*" min="1" id="setting_default_whole_tiao" value="6" oninput="saveSetting('default_whole_tiao',this.value)">
          <button class="qty-btn" onclick="adjSetting('default_whole_tiao',1)">＋</button>
        </div>
      </div>
      <div style="font-size:14px;color:var(--text3);padding-left:2px">條，不足一貫自動進位（廠商未訂購且無剩餘時）</div>
    </div>

    <div class="card">
      <div class="card-title">新增廠商</div>
      <div class="admin-input-row">
        <input class="admin-input" type="text" id="new-vendor-name" placeholder="輸入廠商名稱">
        <button class="btn-add" onclick="addVendor()">新增</button>
      </div>
      <div class="error-msg" id="vendor-error">請輸入廠商名稱，且不能重複</div>
    </div>

    <div class="card">
      <div class="card-title">廠商列表</div>
      <div id="vendor-mgmt-list"></div>
    </div>

    <div class="card">
      <div class="card-title">廠商預設排程</div>
      <div style="font-size:14px;color:var(--text3);margin-bottom:12px">設定各廠商每週固定叫貨數量，每天自動帶入</div>
      <div id="vendor-schedule-list"></div>
    </div>

    <div class="card">
      <div class="card-title">歷史結算紀錄</div>
      <div style="margin-bottom:12px">
        <button class="btn-add" style="width:100%;height:46px;font-size:17px" onclick="manualSaveHistory()">手動儲存今日紀錄</button>
      </div>
      <div id="history-list"><div class="no-vendor">尚無歷史紀錄</div></div>
    </div>
  </div>
  </div>
</div>

<!-- 自訂確認對話框 -->
<div id="custom-dialog" style="
  display:none; position:fixed; inset:0; z-index:999;
  background:rgba(0,0,0,0.5);
  align-items:center; justify-content:center;
">
  <div style="
    background:var(--bg); border-radius:var(--radius-lg);
    padding:28px 24px; margin:20px; max-width:360px; width:100%;
  ">
    <div style="font-size:20px;font-weight:600;color:var(--text);text-align:center;margin-bottom:24px">
      確認今日數量皆已正確？
    </div>
    <div style="display:flex;gap:12px">
      <button onclick="dialogAnswer(false)" style="
        flex:1; padding:16px 0; font-size:20px; font-weight:600;
        border:none; border-radius:var(--radius-lg); cursor:pointer;
        background:#c0392b; color:#fff;
        -webkit-tap-highlight-color:transparent;
      ">否</button>
      <button onclick="dialogAnswer(true)" style="
        flex:1; padding:16px 0; font-size:20px; font-weight:600;
        border:none; border-radius:var(--radius-lg); cursor:pointer;
        background:#2d7a3a; color:#fff;
        -webkit-tap-highlight-color:transparent;
      ">是</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyB63VmNeta7bMhqBkm69liZ7Xf0ks0_HFM",
  authDomain: "yash-toast.firebaseapp.com",
  databaseURL: "https://yash-toast-default-rtdb.firebaseio.com",
  projectId: "yash-toast",
  storageBucket: "yash-toast.firebasestorage.app",
  messagingSenderId: "356741943466",
  appId: "1:356741943466:web:ec5e75cafb74dacb7a00d3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const TZ = 'Asia/Taipei';

function getTaipeiDateStr() {
  return new Date().toLocaleDateString('zh-TW', {
    timeZone: TZ, year: 'numeric', month: '2-digit', day: '2-digit'
  });
}

function getTaipeiHour() {
  return parseInt(new Date().toLocaleString('zh-TW', {
    timeZone: TZ, hour: '2-digit', hour12: false
  }));
}

function getResetDate() {
  // 凌晨0點後算新的一天
  return getTaipeiDateStr();
}

function getDefaultState(vendors) {
  const orders = {};
  vendors.forEach(v => { orders[v] = { white: 0, whole: 0 }; });
  return { orders, remain_white: 0, remain_whole: 0, resetDate: getResetDate() };
}

// Firebase key 安全轉換（不允許 . # $ [ ] /）
function toKey(str) {
  return str.replace(/[.#$[\]/]/g, '_');
}

let vendors = [];
let state = {};
let isSyncing = false;
let initDone = false;
let vendorSchedules = {}; // { vendorKey: { 0:{white,whole}, 1:{white,whole}, ... 6:{white,whole} } }
let settings = { store_white: 15, default_whole_tiao: 6 };

async function saveToFirebase(force = false) {
  if (isSyncing && !force) return;
  const safeState = {
    remain_white: state.remain_white || 0,
    remain_whole: state.remain_whole || 0,
    extra_white: state.extra_white || 0,
    extra_whole: state.extra_whole || 0,
    locked: state.locked || false,
    confirmTime: state.confirmTime || null,
    resetDate: state.resetDate,
    orders: {}
  };
  vendors.forEach(v => {
    safeState.orders[toKey(v)] = state.orders[v] || { white: 0, whole: 0 };
  });
  await set(ref(db, 'data'), safeState);
  await set(ref(db, 'vendors'), vendors);
}

async function saveSettings() {
  await set(ref(db, 'settings'), settings);
  applySettingsToUI();
  updateResult();
}

function applySettingsToUI() {
  const sw = document.getElementById('setting_store_white');
  const sg = document.getElementById('setting_default_whole_tiao');
  if (sw) sw.value = settings.store_white;
  if (sg) sg.value = settings.default_whole_tiao;
}

function applyState(data) {
  if (!data) return;
  state.remain_white = data.remain_white || 0;
  state.remain_whole = data.remain_whole || 0;
  state.extra_white = data.extra_white || 0;
  state.extra_whole = data.extra_whole || 0;
  state.locked = data.locked || false;
  state.confirmTime = data.confirmTime || null;
  state.resetDate = data.resetDate || getResetDate();
  if (data.orders) {
    vendors.forEach(v => {
      const k = toKey(v);
      state.orders[v] = data.orders[k] || { white: 0, whole: 0 };
    });
  }
  const rw = document.getElementById('remain_white');
  const ro = document.getElementById('remain_whole');
  const ew = document.getElementById('extra_white');
  const eo = document.getElementById('extra_whole');
  if (rw) rw.value = state.remain_white;
  if (ro) ro.value = state.remain_whole;
  if (ew) ew.value = state.extra_white || 0;
  if (eo) eo.value = state.extra_whole || 0;
  vendors.forEach(v => {
    const vid = v.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_');
    const ew = document.getElementById(`v_${vid}_white`);
    const eo = document.getElementById(`v_${vid}_whole`);
    if (ew) ew.value = state.orders[v]?.white || 0;
    if (eo) eo.value = state.orders[v]?.whole || 0;
  });
  applyLockUI();
  updateResult();
}

async function init() {
  document.getElementById('date-display').textContent = '台北時間 ' + getTaipeiDateStr();

  // 取得設定
  const sSnap = await get(ref(db, 'settings'));
  if (sSnap.exists()) {
    settings = { ...settings, ...sSnap.val() };
  } else {
    await set(ref(db, 'settings'), settings);
  }
  applySettingsToUI();

  // 取得廠商列表
  const vSnap = await get(ref(db, 'vendors'));
  if (vSnap.exists()) {
    vendors = vSnap.val();
  } else {
    vendors = ['廠商A', '廠商B'];
    await set(ref(db, 'vendors'), vendors);
  }

  // 取得廠商排程
  const scSnap = await get(ref(db, 'vendorSchedules'));
  if (scSnap.exists()) vendorSchedules = scSnap.val();

  state = getDefaultState(vendors);

  // 取得資料並檢查歸零
  const dSnap = await get(ref(db, 'data'));
  const currentResetDate = getResetDate();
  if (dSnap.exists()) {
    const data = dSnap.val();
    if (data.resetDate !== currentResetDate) {
      // 先還原昨天的資料，再存歷史紀錄，最後歸零
      applyState(data);
      await saveHistory();
      state = getDefaultState(vendors);
      state.resetDate = currentResetDate;
      applyScheduleToState();
      await saveToFirebase();
    } else {
      applyState(data);
    }
  } else {
    applyScheduleToState();
    await saveToFirebase();
  }

  renderAll();
  initDone = true;

  document.getElementById('reset-note').textContent = '資料將於今天凌晨 12:00 自動歸零';

  // 即時監聽 Firebase 資料變動（其他手機更新時同步）
  onValue(ref(db, 'data'), (snap) => {
    if (!snap.exists()) return;
    isSyncing = true;
    applyState(snap.val());
    isSyncing = false;
  });

  onValue(ref(db, 'vendors'), (snap) => {
    if (!snap.exists() || !initDone) return;
    vendors = snap.val();
    vendors.forEach(v => {
      if (!state.orders[v]) state.orders[v] = { white: 0, whole: 0 };
    });
    renderVendorInputs();
    renderVendorMgmt();
  });

  onValue(ref(db, 'settings'), (snap) => {
    if (!snap.exists()) return;
    const newSettings = snap.val();
    if (JSON.stringify(newSettings) !== JSON.stringify(settings)) {
      settings = { ...settings, ...newSettings };
      applySettingsToUI();
      updateResult();
    }
  });
}

function applyLockUI() {
  const locked = state.locked || false;
  const btn = document.getElementById('confirm-btn');
  const note = document.getElementById('confirm-note');
  if (!btn) return;

  if (locked) {
    btn.textContent = '重新開放修改';
    btn.style.background = '#888780';
    note.style.display = 'block';
    const timeEl = document.getElementById('confirm-time');
    if (timeEl) {
      timeEl.style.display = state.confirmTime ? 'block' : 'none';
      timeEl.textContent = state.confirmTime ? '確認時間：' + state.confirmTime : '';
    }
  } else {
    btn.textContent = '當日數量已確認';
    btn.style.background = '#2d7a3a';
    note.style.display = 'none';
    note.textContent = '數量已鎖定，再按一次可重新修改';
    note.style.color = 'var(--text3)';
    const timeEl = document.getElementById('confirm-time');
    if (timeEl) timeEl.style.display = 'none';
  }

  // 只鎖定輸入訂單頁面的欄位，不影響管理模式
  const mainTab = document.getElementById('tab-main');
  if (mainTab) {
    mainTab.querySelectorAll('.qty-input, .qty-btn').forEach(el => {
      el.disabled = locked;
      el.style.opacity = locked ? '0.4' : '1';
    });
  }
}

    return;
  }

  isSyncing = false;
};

window.dialogAnswer = async function(confirmed) {
  const dialog = document.getElementById('custom-dialog');
  dialog.style.display = 'none';
  if (!confirmed) return;

  state.locked = true;
  state.confirmTime = new Date().toLocaleString('zh-TW', {
    timeZone: TZ, month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  });

  const whiteGuan = document.getElementById('need-white-guan').textContent;
  const wholeGuan = document.getElementById('need-whole-guan').textContent;

  const now = new Date();
  const taipeiStr = now.toLocaleDateString('zh-TW', { timeZone: TZ, year: 'numeric', month: '2-digit', day: '2-digit' });
  const [y, m, d] = taipeiStr.split('/').map(Number);
  const today = new Date(y, m - 1, d);
  const dayOfWeek = today.getDay();
  const daysToAdd = dayOfWeek === 6 ? 2 : 1;
  const next = new Date(today);
  next.setDate(today.getDate() + daysToAdd);
  const mm = String(next.getMonth() + 1).padStart(2, '0');
  const dd = String(next.getDate()).padStart(2, '0');
  const dateLabel = mm + '/' + dd;
  const msg = dateLabel + '\n白吐司 ' + whiteGuan + '\n全麥吐司 ' + wholeGuan;

  let copied = false;
  try {
    await navigator.clipboard.writeText(msg);
    copied = true;
  } catch {
    try {
      const ta = document.createElement('textarea');
      ta.value = msg;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      copied = document.execCommand('copy');
      document.body.removeChild(ta);
    } catch { copied = false; }
  }

  applyLockUI();
  const note = document.getElementById('confirm-note');
  note.style.display = 'block';
  if (copied) {
    note.textContent = '✓ 吐司數量已複製到剪貼簿，請到雅式 LINE 群組貼上';
    note.style.color = 'var(--success)';
  } else {
    note.textContent = '數量已鎖定，再按一次可重新修改';
    note.style.color = 'var(--text3)';
  }

  isSyncing = true;
  await saveToFirebase(true);
  isSyncing = false;
};

window.startEditVendor = function(i) {
  document.getElementById('vname_' + i).style.display = 'none';
  document.getElementById('vedit_' + i).style.display = 'block';
  document.getElementById('vbtn_edit_' + i).style.display = 'none';
  document.getElementById('vbtn_save_' + i).style.display = 'block';

};

window.saveEditVendor = async function(i) {
  const input = document.getElementById('vedit_' + i);
  const newName = input.value.trim();
  const oldName = vendors[i];
  if (!newName || (newName !== oldName && vendors.includes(newName))) {
    input.focus();
    return;
  }
  if (newName === oldName) {
    renderVendorMgmt();
    return;
  }
  // 更新廠商名稱並搬移訂單資料
  vendors[i] = newName;
  state.orders[newName] = state.orders[oldName] || { white: 0, whole: 0 };
  delete state.orders[oldName];
  await saveToFirebase();
  renderVendorInputs();
  renderVendorMgmt();
};

window.adjVendor = function(v, type, d) {
  if (!state.orders[v]) state.orders[v] = { white: 0, whole: 0 };
  state.orders[v][type] = Math.max(0, (state.orders[v][type] || 0) + d);
  const vid = v.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_');
  const el = document.getElementById(`v_${vid}_${type}`);
  if (el) el.value = state.orders[v][type];
  saveData();
};

window.setVendor = function(v, type, val) {
  if (!state.orders[v]) state.orders[v] = { white: 0, whole: 0 };
  state.orders[v][type] = Math.max(0, parseInt(val) || 0);
  saveData();
};

window.adj = function(id, d) {
  const el = document.getElementById(id);
  el.value = Math.max(0, (parseInt(el.value) || 0) + d);
  saveData();
};

window.adjSetting = function(key, d) {
  const el = document.getElementById('setting_' + key);
  const newVal = Math.max(1, (settings[key] || 1) + d);
  settings[key] = newVal;
  if (el) el.value = newVal;
  saveSettings();
};

window.saveSetting = function(key, val) {
  settings[key] = Math.max(1, parseInt(val) || 1);
  saveSettings();
};

function saveData() {
  state.remain_white = Math.max(0, parseInt(document.getElementById('remain_white')?.value) || 0);
  state.remain_whole = Math.max(0, parseInt(document.getElementById('remain_whole')?.value) || 0);
  state.extra_white = Math.max(0, parseInt(document.getElementById('extra_white')?.value) || 0);
  state.extra_whole = Math.max(0, parseInt(document.getElementById('extra_whole')?.value) || 0);
  updateResult();
  saveToFirebase();
}

function updateResult() {
  let tw = 0, to = 0;
  vendors.forEach(v => {
    tw += state.orders[v]?.white || 0;
    to += state.orders[v]?.whole || 0;
  });
  const ew = state.extra_white || 0;
  const eo = state.extra_whole || 0;
  const rw = state.remain_white || 0;
  const ro = state.remain_whole || 0;
  const storeWhite = settings.store_white || 15;
  const defaultWholeTiao = settings.default_whole_tiao || 6;

  // 白吐司：廠商 + 臨時 + 店面預設 - 剩餘 → 無條件進位到貫，最少1貫
  const totalWhite = tw + ew;
  const whiteNet = Math.max(0, totalWhite + storeWhite - rw);
  const whiteGuan = Math.max(1, Math.ceil(whiteNet / 6));
  const whiteTiao = whiteGuan * 6;
  const whiteStore = whiteTiao - totalWhite;

  // 全麥：
  // 廠商+臨時=0 且 剩餘≥3 → 0貫不做
  // 廠商+臨時=0 且 剩餘<3 → 預設條數進位，最少1貫
  // 廠商+臨時>0 → 先算淨需求進位，再確保店面至少2條，不足多加一貫
  const totalWhole = to + eo;
  let wholeGuan, wholeTiao, wholeStore;
  if (totalWhole === 0 && ro >= 3) {
    wholeGuan = 0;
    wholeTiao = 0;
    wholeStore = 0;
  } else if (totalWhole === 0) {
    wholeGuan = Math.max(1, Math.ceil(defaultWholeTiao / 6));
    wholeTiao = wholeGuan * 6;
    wholeStore = wholeTiao - totalWhole;
  } else {
    const wholeNet = Math.max(0, totalWhole - ro);
    wholeGuan = Math.max(1, Math.ceil(wholeNet / 6));
    wholeTiao = wholeGuan * 6;
    // 確保製作後店面至少有2條（含剩餘庫存）
    if ((wholeTiao + ro - totalWhole) < 2) {
      wholeGuan += 1;
      wholeTiao = wholeGuan * 6;
    }
    wholeStore = wholeTiao + ro - totalWhole;
  }

  // 白吐司店面實際可賣 = 製作條數 + 剩餘 - 廠商訂購
  const whiteStoreActual = whiteTiao + rw - totalWhite;

  document.getElementById('need-white-guan').textContent = whiteGuan + ' 貫';
  document.getElementById('need-white-tiao').textContent = '（' + whiteTiao + ' 條）';
  const whiteExtraText = ew > 0 ? '　臨時 ' + ew + ' 條' : '';
  document.getElementById('white-breakdown').textContent =
    '廠商 ' + tw + ' 條' + whiteExtraText + '　店面 ' + whiteStoreActual + ' 條';

  // 全麥店面實際可賣 = 製作條數 + 剩餘 - 廠商訂購
  const wholeStoreActual = wholeTiao + ro - totalWhole;

  document.getElementById('need-whole-guan').textContent = wholeGuan + ' 貫';
  document.getElementById('need-whole-tiao').textContent = wholeGuan === 0 ? '（不製作）' : '（' + wholeTiao + ' 條）';
  const wholeExtraText = eo > 0 ? '　臨時 ' + eo + ' 條' : '';
  document.getElementById('whole-breakdown').textContent = wholeGuan === 0
    ? '廠商未訂購　剩餘 ' + ro + ' 條　明日不製作'
    : '廠商 ' + to + ' 條' + wholeExtraText + '　店面 ' + wholeStoreActual + ' 條';
}

window.addVendor = async function() {
  const inp = document.getElementById('new-vendor-name');
  const errEl = document.getElementById('vendor-error');
  const name = inp.value.trim();
  if (!name || vendors.includes(name)) {

  inp.value = '';
  renderAll();
};

window.removeVendor = async function(v) {
  if (!confirm(`確定要移除「${v}」嗎？`)) return;
  vendors = vendors.filter(x => x !== v);
  delete state.orders[v];
  await saveToFirebase();
  renderAll();
};

let secretTapCount = 0;
let secretTapTimer = null;

// 每分鐘檢查歸零
setInterval(async () => {
  const cur = getResetDate();
  if (state.resetDate !== cur) {
    await saveHistory();
    state = getDefaultState(vendors);
    state.resetDate = cur;
    applyScheduleToState();

  }
}, 60000);

const DAYS = ['日', '一', '二', '三', '四', '五', '六'];

function applyScheduleToState() {
  const now = new Date();
  const dayOfWeek = parseInt(now.toLocaleDateString('zh-TW', { timeZone: TZ, weekday: 'short' }).replace('週','').replace('周','')) || now.getDay();
  // 取得台北時間今天是星期幾 (0=日~6=六)
  const taipeiDay = now.toLocaleDateString('en-US', { timeZone: TZ, weekday: 'short' });
  const dayMap = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
  const d = dayMap[taipeiDay] ?? now.getDay();
  vendors.forEach(v => {
    const key = toKey(v);
    const sched = vendorSchedules[key]?.[d];
    if (sched) {
      state.orders[v] = {
        white: sched.white || 0,
        whole: sched.whole || 0
      };
    }
  });
}

function renderVendorSchedule() {
  const el = document.getElementById('vendor-schedule-list');
  if (!el) return;

    el.innerHTML = '<div class="no-vendor">尚無廠商</div>';

      const o = vendorSchedules[key]?.[d]?.whole || 0;

        + '<div class="schedule-day-label">週' + DAYS[d] + '</div>'
        + '<div class="schedule-type-label">白</div>'
        + '<input class="schedule-input qty-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" value="' + w + '" oninput="saveSchedule(\'' + key + '\',' + d + ',\'white\',this.value)">'
        + '<div class="schedule-type-label" style="margin-left:8px">全麥</div>'
        + '<input class="schedule-input qty-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" value="' + o + '" oninput="saveSchedule(\'' + key + '\',' + d + ',\'whole\',this.value)">'
        + '</div>';

window.toggleSchedule = function(vi) {
  const body = document.getElementById('schedule-body-' + vi);
  const arrow = document.getElementById('schedule-arrow-' + vi);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arrow.textContent = isOpen ? '▶' : '▼';
};

window.saveSchedule = async function(key, day, type, val) {
  if (!vendorSchedules[key]) vendorSchedules[key] = {};
  if (!vendorSchedules[key][day]) vendorSchedules[key][day] = { white: 0, whole: 0 };
  vendorSchedules[key][day][type] = Math.max(0, parseInt(val) || 0);
  await set(ref(db, 'vendorSchedules'), vendorSchedules);
};

window.manualSaveHistory = async function() {
  await saveHistory();
  await loadAndRenderHistory();
  alert('已儲存今日紀錄！');
};

async function saveHistory() {
  // 計算當天結算數量
  let tw = 0, to = 0;
  vendors.forEach(v => {
    tw += state.orders[v]?.white || 0;
    to += state.orders[v]?.whole || 0;
  });
  const ew = state.extra_white || 0;
  const eo = state.extra_whole || 0;
  const rw = state.remain_white || 0;
  const ro = state.remain_whole || 0;
  const storeWhite = settings.store_white || 15;
  const defaultWholeTiao = settings.default_whole_tiao || 6;

  const totalWhite = tw + ew;
  const whiteNet = Math.max(0, totalWhite + storeWhite - rw);
  const whiteGuan = Math.max(1, Math.ceil(whiteNet / 6));

  const totalWhole = to + eo;
  let wholeGuan;
  if (totalWhole === 0 && ro >= 3) {
    wholeGuan = 0;
  } else if (totalWhole === 0) {
    wholeGuan = Math.max(1, Math.ceil(defaultWholeTiao / 6));
  } else {
    const wholeNet = Math.max(0, totalWhole - ro);
    wholeGuan = Math.max(1, Math.ceil(wholeNet / 6));
    if ((wholeGuan * 6 + ro - totalWhole) < 2) wholeGuan += 1;
  }

  // 廠商明細
  const vendorDetail = {};
  vendors.forEach(v => {
    const w = state.orders[v]?.white || 0;
    const o = state.orders[v]?.whole || 0;
    if (w > 0 || o > 0) vendorDetail[toKey(v)] = { name: v, white: w, whole: o };
  });

  const record = {
    date: state.resetDate,
    whiteGuan,
    whiteTiao: whiteGuan * 6,
    wholeGuan,
    wholeTiao: wholeGuan * 6,
    remainWhite: rw,
    remainWhole: ro,
    extraWhite: ew,
    extraWhole: eo,
    vendors: vendorDetail
  };

  // 只保留最近30筆
  const histSnap = await get(ref(db, 'history'));
  let history = histSnap.exists() ? histSnap.val() : [];
  if (!Array.isArray(history)) history = Object.values(history);
  history.unshift(record);
  if (history.length > 30) history = history.slice(0, 30);
  await set(ref(db, 'history'), history);
}

async function loadAndRenderHistory() {
  const histSnap = await get(ref(db, 'history'));
  const el = document.getElementById('history-list');
  if (!el) return;
  if (!histSnap.exists()) {
    el.innerHTML = '<div class="no-vendor">尚無歷史紀錄</div>';
    return;
  }
  let history = histSnap.val();
  if (!Array.isArray(history)) history = Object.values(history);
  if (history.length === 0) {
    el.innerHTML = '<div class="no-vendor">尚無歷史紀錄</div>';
    return;
  }
  el.innerHTML = history.map((r, i) => {
    const vendorLines = Object.values(r.vendors || {}).map(v =>
      '<div class="history-vendor">・' + v.name + '：白 ' + v.white + ' 條 / 全麥 ' + v.whole + ' 條</div>'
    ).join('');
    const wholeText = r.wholeGuan === 0 ? '不製作' : r.wholeGuan + ' 貫（' + r.wholeTiao + ' 條）';
    const extraLine = (r.extraWhite > 0 || r.extraWhole > 0)
      ? '<div class="history-detail">臨時：白 ' + r.extraWhite + ' 條 / 全麥 ' + r.extraWhole + ' 條</div>'
      : '';
    const vendorSection = vendorLines
      ? '<div class="history-detail" style="margin-top:4px">廠商明細：</div>' + vendorLines
      : '';
    return '<div class="history-item">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
      + '<div class="history-date">' + r.date + '</div>'
      + '<button class="btn-del" onclick="deleteHistory(' + i + ')">刪除</button>'
      + '</div>'
      + '<div class="history-guan">白吐司 ' + r.whiteGuan + ' 貫（' + r.whiteTiao + ' 條）</div>'
      + '<div class="history-guan">全麥吐司 ' + wholeText + '</div>'
      + '<div class="history-detail">剩餘：白 ' + r.remainWhite + ' 條 / 全麥 ' + r.remainWhole + ' 條</div>'
      + extraLine + vendorSection
      + '</div>';
  }).join('');
}

window.deleteHistory = async function(i) {
  if (!confirm('確定要刪除這筆紀錄嗎？')) return;
  const histSnap = await get(ref(db, 'history'));
  if (!histSnap.exists()) return;
  let history = histSnap.val();
  if (!Array.isArray(history)) history = Object.values(history);
  history.splice(i, 1);
  await set(ref(db, 'history'), history);
  await loadAndRenderHistory();
};

// 匿名登入後再初始化
signInAnonymously(auth).catch(err => console.error('Auth error:', err));
onAuthStateChanged(auth, user => {
  if (user && !initDone) init();
});

// 點進數字輸入框時全選，方便直接輸入新數字
document.addEventListener('focusin', function(e) {
  if (e.target.classList.contains('qty-input')) {
    setTimeout(() => { e.target.select(); }, 0);
  }
});

document.addEventListener('touchmove', function(e) {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

document.addEventListener('gesturestart', function(e) {
  e.preventDefault();
}, { passive: false });

let lastTouchEnd = 0;
document.addEventListener('touchend', function(e) {
  const tag = e.target.tagName;
  if (tag === 'BUTTON' || tag === 'INPUT') return;
  const now = Date.now();
  if (now - lastTouchEnd < 200) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });
</script>
